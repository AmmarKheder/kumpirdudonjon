<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kumpir du Donjon — Bientôt à Niort</title>
<meta name="description" content="Le kumpir arrive à Niort. La pomme de terre au four turque, proche du Donjon. Ouverture bientôt.">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<meta property="og:title" content="Le kumpir arrive à Niort">
<meta property="og:description" content="La pomme de terre au four turque, proche du Donjon. Ouverture bientôt.">
<meta property="og:image" content="logo.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://kumpirdudonjon.fr">
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Karla:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --brique:#A83418;
    --brique-clair:#C4502C;
    --or:#C99B2E;
    --or-clair:#E8C87A;
    --pierre:#F2E9DB;
    --nuit:#1E1210;
    --creme:#FBF6EE;
  }

  *{margin:0;padding:0;box-sizing:border-box}

  html{scroll-behavior:smooth}

  body{
    background:var(--nuit);
    color:var(--pierre);
    font-family:'Karla',system-ui,-apple-system,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 20px;
    overflow-x:hidden;
    position:relative;
  }

  /* Halo de four : la chaleur qui monte du donjon */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(120% 80% at 50% 110%, rgba(201,155,46,.22) 0%, rgba(168,52,24,.10) 38%, transparent 68%);
    pointer-events:none;
    z-index:0;
  }

  /* Texture pierre très discrète */
  body::after{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      repeating-linear-gradient(0deg, transparent 0 46px, rgba(242,233,219,.022) 46px 47px),
      repeating-linear-gradient(90deg, transparent 0 92px, rgba(242,233,219,.022) 92px 93px);
    pointer-events:none;
    z-index:0;
  }

  .carte{
    position:relative;
    z-index:1;
    width:100%;
    max-width:620px;
    text-align:center;
  }

  /* --- Logo --- */
  .logo{
    width:min(230px,60vw);
    height:auto;
    display:block;
    margin:0 auto 34px;
    filter:drop-shadow(0 14px 40px rgba(201,155,46,.28));
    animation:apparait .9s cubic-bezier(.2,.7,.3,1) both;
  }

  /* --- Eyebrow : la vapeur --- */
  .vapeur{
    font-size:12px;
    font-weight:700;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--or);
    margin-bottom:22px;
    animation:apparait .9s cubic-bezier(.2,.7,.3,1) .15s both;
  }

  /* --- Titre --- */
  h1{
    font-family:'Cinzel',Georgia,serif;
    font-weight:700;
    font-size:clamp(2.1rem,7.2vw,3.6rem);
    line-height:1.12;
    color:var(--creme);
    letter-spacing:.01em;
    margin-bottom:20px;
    animation:apparait .9s cubic-bezier(.2,.7,.3,1) .28s both;
  }

  h1 .accent{
    color:var(--or-clair);
    display:block;
  }

  /* --- Baseline --- */
  .baseline{
    font-size:clamp(1.02rem,3.1vw,1.22rem);
    font-weight:600;
    color:rgba(242,233,219,.9);
    margin-bottom:14px;
    animation:apparait .9s cubic-bezier(.2,.7,.3,1) .4s both;
  }

  .sous{
    font-size:clamp(.92rem,2.6vw,1rem);
    color:rgba(242,233,219,.62);
    line-height:1.65;
    max-width:38ch;
    margin:0 auto 36px;
    animation:apparait .9s cubic-bezier(.2,.7,.3,1) .5s both;
  }

  /* --- Signature : la herse du donjon qui se lève --- */
  .herse{
    width:min(300px,80%);
    margin:0 auto 36px;
    animation:apparait .9s cubic-bezier(.2,.7,.3,1) .6s both;
  }

  .herse svg{width:100%;height:auto;display:block}

  .herse .barreau{
    stroke:var(--brique-clair);
    stroke-width:2.5;
    stroke-linecap:round;
    opacity:.55;
  }

  .herse .braise{
    fill:var(--or);
  }

  /* --- Bloc "bientôt" --- */
  .bientot{
    display:inline-flex;
    align-items:center;
    gap:11px;
    padding:11px 24px;
    border:1px solid rgba(201,155,46,.34);
    border-radius:100px;
    background:rgba(201,155,46,.06);
    font-size:13px;
    font-weight:700;
    letter-spacing:.15em;
    text-transform:uppercase;
    color:var(--or-clair);
    margin-bottom:40px;
    animation:apparait .9s cubic-bezier(.2,.7,.3,1) .7s both;
  }

  .braise-point{
    width:7px;height:7px;
    border-radius:50%;
    background:var(--or);
    box-shadow:0 0 12px var(--or);
    animation:pulse 2.6s ease-in-out infinite;
    flex-shrink:0;
  }

  /* --- Réseaux --- */
  .reseaux{
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
    animation:apparait .9s cubic-bezier(.2,.7,.3,1) .8s both;
  }

  .reseau{
    display:inline-flex;
    align-items:center;
    gap:9px;
    padding:13px 24px;
    border-radius:100px;
    text-decoration:none;
    font-weight:700;
    font-size:14.5px;
    letter-spacing:.02em;
    transition:transform .22s cubic-bezier(.2,.7,.3,1), box-shadow .22s ease, background .22s ease;
  }

  .reseau svg{width:17px;height:17px;flex-shrink:0}

  .insta{
    background:var(--brique);
    color:var(--creme);
    box-shadow:0 6px 22px rgba(168,52,24,.36);
  }
  .insta:hover{background:var(--brique-clair);transform:translateY(-2px);box-shadow:0 10px 30px rgba(168,52,24,.5)}

  .tiktok{
    background:transparent;
    color:var(--or-clair);
    border:1px solid rgba(201,155,46,.42);
  }
  .tiktok:hover{background:rgba(201,155,46,.12);transform:translateY(-2px);border-color:var(--or)}

  .reseau:focus-visible{outline:2px solid var(--or-clair);outline-offset:3px}

  /* --- Pied --- */
  .pied{
    margin-top:44px;
    font-size:11.5px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:rgba(242,233,219,.3);
    animation:apparait .9s cubic-bezier(.2,.7,.3,1) .9s both;
  }

  /* --- Animations --- */
  @keyframes apparait{
    from{opacity:0;transform:translateY(16px)}
    to{opacity:1;transform:none}
  }

  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:.45;transform:scale(.82)}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important}
  }

  @media (max-width:480px){
    .reseaux{flex-direction:column;align-items:stretch}
    .reseau{justify-content:center}
  }
</style>
</head>
<body>

  <main class="carte">

    <img src="logo.png" alt="Kumpir du Donjon" class="logo" width="230" height="230">

    <p class="vapeur">Pomme de terre au four · Niort</p>

    <h1>
      Le kumpir
      <span class="accent">arrive à Niort</span>
    </h1>

    <p class="baseline">Manger sain, sans se ruiner.</p>

    <p class="sous">
      La spécialité turque, cuite au four et garnie devant vous.
      Bientôt ouvert, tout proche du Donjon.
    </p>

    <div class="herse" aria-hidden="true">
      <svg viewBox="0 0 300 42" xmlns="http://www.w3.org/2000/svg">
        <line class="barreau" x1="30"  y1="6" x2="30"  y2="36"/>
        <line class="barreau" x1="60"  y1="6" x2="60"  y2="36"/>
        <line class="barreau" x1="90"  y1="6" x2="90"  y2="36"/>
        <line class="barreau" x1="120" y1="6" x2="120" y2="36"/>
        <line class="barreau" x1="180" y1="6" x2="180" y2="36"/>
        <line class="barreau" x1="210" y1="6" x2="210" y2="36"/>
        <line class="barreau" x1="240" y1="6" x2="240" y2="36"/>
        <line class="barreau" x1="270" y1="6" x2="270" y2="36"/>
        <line class="barreau" x1="18" y1="21" x2="132" y2="21"/>
        <line class="barreau" x1="168" y1="21" x2="282" y2="21"/>
        <circle class="braise" cx="150" cy="21" r="3.5"/>
      </svg>
    </div>

    <div class="bientot">
      <span class="braise-point" aria-hidden="true"></span>
      Ouverture bientôt
    </div>

    <nav class="reseaux" aria-label="Réseaux sociaux">
      <a class="reseau insta" href="https://www.instagram.com/kumpir.du.donjon/" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

        </svg>
        Instagram
      </a>

      <a class="reseau tiktok" href="https://www.tiktok.com/@kumpir.du.donjon" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-5.2 1.74 2.89 2.89 0 013.18-4.51V9.4a6.34 6.34 0 00-1-.05A6.34 6.34 0 005 20.72a6.34 6.34 0 0010.86-4.43v-7a8.16 8.16 0 004.77 1.52v-3.4a4.85 4.85 0 01-1-.12z"/>

      </a>
    </nav>

    <p class="pied">@kumpir.du.donjon</p>

  </main>

</body>
</html>
